<div class="admin__field field-json-file-upload" style="margin-bottom: 24px; padding: 16px; background: #f8f8f8; border: 1px solid #e3e3e3; border-radius: 4px;">
    <label class="label admin__field-label" style="display: block; margin-bottom: 12px; font-weight: 600; font-size: 14px; color: #303030;">
        <span data-bind="i18n: 'Upload JSON File'"></span>
    </label>
    <div class="admin__field-control">
        <div class="file-uploader-wrapper" style="position: relative; display: inline-block; width: 100%;">
            <input type="file"
                   id="json-file-input"
                   accept=".json,application/json"
                   class="admin__control-file"
                   style="display: block; padding: 10px 12px; border: 2px dashed #c1c1c1; border-radius: 4px; width: 100%; cursor: pointer; background: white; font-size: 13px; transition: all 0.3s ease;"
                   onmouseover="this.style.borderColor='#1979c3'; this.style.background='#f0f7fc';"
                   onmouseout="this.style.borderColor='#c1c1c1'; this.style.background='white';"/>
        </div>
        <div class="admin__field-note" style="margin-top: 10px; font-size: 12px; color: #666;">
            <span data-bind="i18n: 'Upload a JSON file exported from another menu. The content will automatically populate the textarea below.'"></span>
        </div>
        <div id="file-upload-status" style="margin-top: 8px; font-size: 12px; font-weight: 600; display: none;"></div>
    </div>
</div>
