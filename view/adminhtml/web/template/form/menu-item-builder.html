<div class="admin__field admin__field-wide panth-menu-builder">
    <!-- Header -->
    <div class="admin__field-label">
        <label><span data-bind="i18n: 'Menu Items Builder'"></span></label>
    </div>

    <div class="admin__field-control">
        <!-- Toolbar -->
        <div class="menu-toolbar" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;">
            <button type="button" class="action-default scalable primary" data-bind="click: addRootItem">
                <span data-bind="i18n: 'Add Root Item'"></span>
            </button>
            <button type="button" class="action-default" data-bind="click: expandAll"><span data-bind="i18n: 'Expand All'"></span></button>
            <button type="button" class="action-default" data-bind="click: collapseAll"><span data-bind="i18n: 'Collapse All'"></span></button>
            <button type="button" class="action-default" data-bind="click: importAllCategories"><span data-bind="i18n: 'Import Categories'"></span></button>
            <button type="button" class="action-default action-secondary" data-bind="click: loadDemoMenu"><span data-bind="i18n: 'Load Demo'"></span></button>
            <button type="button" class="action-default action-delete" data-bind="click: clearAllItems"><span data-bind="i18n: 'Clear All'"></span></button>
        </div>

        <!-- Loading -->
        <div data-bind="visible: isLoading()" style="display: none;">
            <div class="admin__data-grid-loading-mask">
                <div class="admin__data-grid-loader">
                    <div class="spinner"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div data-bind="visible: !isLoading() &amp;&amp; items().length === 0" style="display: none; padding: 40px; text-align: center; background: #f9f9f9; border: 1px solid #e3e3e3; border-radius: 3px;">
            <div style="color: #999; font-size: 16px; margin-bottom: 10px;">
                <span data-bind="i18n: 'No menu items yet'"></span>
            </div>
            <div style="color: #666; font-size: 13px; margin-bottom: 20px;">
                <span data-bind="i18n: 'Click Add Root Item to create your first menu item'"></span>
            </div>
            <div>
                <button type="button" class="action-default scalable" data-bind="click: importAllCategories">
                    <span data-bind="i18n: 'Import Categories'"></span>
                </button>
                <button type="button" class="action-default action-secondary scalable" data-bind="click: loadDemoMenu" style="margin-left: 10px;">
                    <span data-bind="i18n: 'Load Demo Menu'"></span>
                </button>
            </div>
        </div>

        <!-- Menu Tree -->
        <div class="menu-tree-wrapper" data-bind="visible: items().length > 0" style="display: none;">
            <!-- Column Headers -->
            <div class="menu-grid-header">
                <span class="col-drag"></span>
                <span class="col-toggle"></span>
                <span class="col-title" data-bind="i18n: 'Title'"></span>
                <span class="col-url" data-bind="i18n: 'URL'"></span>
                <span class="col-status" data-bind="i18n: 'Status'"></span>
                <span class="col-actions" data-bind="i18n: 'Actions'"></span>
            </div>

            <!-- Root Level Items -->
            <ul class="menu-items-list menu-level-0" data-bind="foreach: getRootItems()">
                <li class="menu-item" data-bind="attr: { 'data-item-id': item_id, 'data-level': level || 0 }, css: { 'is-inactive': !is_active }">
                    <div class="menu-grid-row">
                        <span class="col-drag">
                            <span class="drag-handle">≡</span>
                        </span>
                        <span class="col-toggle">
                            <!-- Always show toggle button, let visible binding control visibility -->
                            <button type="button" class="tree-toggle" data-bind="
                                visible: $parent.getChildItems(item_id).length > 0,
                                click: $parent.toggleExpand.bind($parent, item_id)
                            " style="display: inline-block;">
                                <span data-bind="text: $parent.isExpanded(item_id) ? '−' : '+'"></span>
                            </button>
                        </span>
                        <span class="col-title">
                            <span class="item-title" data-bind="text: title, click: $parent.editItem.bind($parent, item_id)"></span>
                            <!-- ko if: $parent.hasChildren(item_id) -->
                            <span class="item-count" data-bind="text: '(' + $parent.getChildItems(item_id).length + ')'"></span>
                            <!-- /ko -->
                        </span>
                        <span class="col-url" data-bind="text: url"></span>
                        <span class="col-status">
                            <span class="status-badge" data-bind="text: is_active ? 'Active' : 'Inactive', css: { 'badge-active': is_active, 'badge-inactive': !is_active }"></span>
                        </span>
                        <span class="col-actions">
                            <button type="button" class="action-default action-sm" data-bind="click: $parent.toggleItemActive.bind($parent, item_id)">
                                <span data-bind="text: is_active ? 'Disable' : 'Enable'"></span>
                            </button>
                            <button type="button" class="action-default action-sm" data-bind="click: $parent.addItem.bind($parent, item_id)">
                                <span>Add Child</span>
                            </button>
                            <button type="button" class="action-default action-sm" data-bind="click: $parent.duplicateItem.bind($parent, item_id)">
                                <span>Duplicate</span>
                            </button>
                            <button type="button" class="action-default action-sm" data-bind="click: $parent.editItem.bind($parent, item_id)">
                                <span>Edit</span>
                            </button>
                            <button type="button" class="action-default action-delete action-sm" data-bind="click: $parent.deleteItem.bind($parent, item_id)">
                                <span>Delete</span>
                            </button>
                        </span>
                    </div>

                    <!-- Level 1 Children -->
                    <!-- Keep empty containers visible, hide only when has children and collapsed -->
                    <ul class="menu-items-list menu-children" data-bind="css: { 'empty-drop-zone': $parent.getChildItems(item_id).length === 0 }, visible: $parent.getChildItems(item_id).length === 0 ? true : $parent.isExpanded(item_id)">

<style>
/* Menu Builder Styles */
.panth-menu-builder {
    margin: 20px 0;
}

.menu-tree-wrapper {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 3px;
    padding: 15px;
}

/* Grid System - Headers and Rows */
.menu-grid-header,
.menu-grid-row {
    display: grid;
    grid-template-columns: 30px 30px minmax(200px, 1fr) 250px 80px 520px;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
}

.menu-grid-header {
    background: #f5f5f5;
    border-bottom: 2px solid #ccc;
    font-weight: 600;
    font-size: 12px;
    color: #333;
    margin-bottom: 5px;
}

.menu-grid-row {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.2s;
}

.menu-grid-row:hover {
    background: #f5f8fa;
}

/* Column Alignment */
