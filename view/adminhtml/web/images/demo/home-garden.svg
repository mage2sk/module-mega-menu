<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#f8f9fa"/>
  <!-- House Icon -->
  <g transform="translate(150, 80)">
    <!-- Roof -->
    <path d="M 0 -25 L -35 5 L 35 5 Z" fill="none" stroke="#495057" stroke-width="3" stroke-linejoin="round"/>
    <!-- House body -->
    <rect x="-30" y="5" width="60" height="40" fill="none" stroke="#495057" stroke-width="3"/>
    <!-- Door -->
    <rect x="-10" y="25" width="20" height="20" fill="none" stroke="#6c757d" stroke-width="2"/>
    <!-- Window -->
    <rect x="10" y="15" width="12" height="12" fill="none" stroke="#6c757d" stroke-width="2"/>
    <line x1="16" y1="15" x2="16" y2="27" stroke="#6c757d" stroke-width="1"/>
    <line x1="10" y1="21" x2="22" y2="21" stroke="#6c757d" stroke-width="1"/>
  </g>
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="18" fill="#6c757d" text-anchor="middle" font-weight="600">Home &amp; Garden</text>
</svg>
